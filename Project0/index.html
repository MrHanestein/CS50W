<!doctype html>
<html lang="en">
<head>
    <title>Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .form-control:hover {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
        }
    </style>
</head>
<body>
<div class="d-flex justify-content-center align-items-center vh-100 text-center">
<form action="https://www.google.com/search"  class="w-100" style="max-width: 700px;">

    <input class="rounded-pill form-control border-success mb-4" type="text" name="q" placeholder="Search..">
    <input class="btn btn-light  rounded-pill" type="submit" value="Google Search">
    <input class="btn btn-light rounded-pill" type="submit" value="I'm Feeling Lucky" name="btnI" >

</form>
</div>

</body>
</html>
